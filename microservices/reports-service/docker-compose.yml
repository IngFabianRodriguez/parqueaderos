version: "3.8"

services:
  reports-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reports-service
    ports:
      - "8015:8015"
    environment:
      - APP_ENV=development
      - SERVICE_NAME=reports-service
      - SERVICE_PORT=8015
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/parqueaderos
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - JWT_SECRET_KEY=changeme-in-production
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_ENABLED=true
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - parqueaderos-network

networks:
  parqueaderos-network:
    external: true