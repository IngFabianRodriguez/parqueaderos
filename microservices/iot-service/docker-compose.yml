version: "3.9"

services:
  iot-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iot-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql+asyncpg://parqueaderos:parqueaderos@postgres:5432/parqueaderos
      - REDIS_URL=redis://redis:6379/1
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MQTT_BROKER_URL=mqtt://mqtt:1883
      - SERVICE_PORT=8004
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://telemetry:4317
      - OTEL_SERVICE_NAME=iot-service
    depends_on:
      - postgres
      - redis
      - kafka
      - mqtt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  - parqueaderos-net
